<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Core — Подтверждение</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ... (весь твой CSS остается без изменений) ... */
        :root { --bg-overlay: rgba(10, 1, 24, 0.88); --glass: rgba(20, 10, 35, 0.94); --main-purple: #9d50bb; --mc-green: #55ff55; --price-gold: #ffaa00; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('../static/images/bg.png') no-repeat center center fixed; background-size: cover; color: #ffffff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .back-home { position: fixed; top: 20px; left: 20px; z-index: 1000; text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05); padding: 12px 20px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(157, 80, 187, 0.4); backdrop-filter: blur(10px); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .main-container { background: var(--glass); border: 2px solid rgba(157, 80, 187, 0.4); border-radius: 25px; padding: 40px; max-width: 500px; width: 90%; text-align: center; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; background: linear-gradient(to bottom, #fff, var(--main-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .user-info { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: #55ffff; margin-bottom: 20px; }
        .item-box { background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.1); }
        .item-name { font-family: 'Press Start 2P', cursive; font-size: 0.9rem; color: var(--price-gold); display: block; margin-bottom: 10px; }
        .btn-pay { display: block; width: 100%; background: linear-gradient(135deg, #6e248f, #9d50bb); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 600; font-family: 'Poppins', sans-serif; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; text-decoration: none; box-sizing: border-box; }
        .btn-pay:hover:not(:disabled) { filter: brightness(1.2); box-shadow: 0 0 20px var(--main-purple); transform: translateY(-2px); }
        .checkmark { font-size: 60px; color: var(--mc-green); margin-bottom: 20px; }
        #success-section, #checkout-section { display: none; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <a href="/mainstorige" class="back-home">🏠 В магазин</a>

    <div class="main-container">
        <div id="checkout-section" class="fade-in">
            <h1>ПРОВЕРКА СТАТУСА</h1>
            <div class="user-info">ИГРОК: {{ session['nickname'] }}</div>
            
            <div class="item-box">
                <span class="item-name">{{ item_name }}</span>
                <span style="color: #ccc;">Цена: {{ price }} руб.</span>
            </div>

            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 20px;">
                Пожалуйста, зайдите на сервер перед оплатой, чтобы мы могли мгновенно выдать товар.
            </p>
            
            <button id="pay-button" onclick="startPaymentProcess()" class="btn-pay">
                ПЕРЕЙТИ К ОПЛАТЕ
            </button>
        </div>

        <div id="success-section" class="fade-in">
            <div class="checkmark">✔</div>
            <h1 style="background: linear-gradient(to bottom, #fff, #55ff55); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ГОТОВО!</h1>
            
            <div class="user-info" style="color: #55ff55;">СПАСИБО ЗА ПОКУПКУ!</div>
            
            <div class="item-box">
                <span class="item-name" style="color: #fff;">{{ item_name }}</span>
                <p style="margin: 0; font-size: 0.8rem;">Привилегия автоматически выдана на сервере.</p>
            </div>

            <a href="/mainstorige" class="btn-pay">НА ГЛАВНУЮ</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nickname = "{{ session.get('nickname', '') }}";
        const itemId = "{{ item_id }}";
        const amount = "{{ amount }}";
        const price = "{{ price }}";

        // Функция 1: Проверка игрока и переход на Fondy
        function startPaymentProcess() {
            const btn = document.getElementById('pay-button');
            btn.disabled = true;
            btn.innerText = "ПРОВЕРКА...";

            fetch('/check-before-pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname: nickname })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // Если проверка прошла — имитируем переход на оплату
                    // В реале тут будет: window.location.href = data.checkout_url;
                    alert("Проверка пройдена! Сейчас откроется страница оплаты. (Эмуляция: возвращаем вас с параметром paid=true)");
                    window.location.href = window.location.pathname + window.location.search + "&paid=true";
                } else {
                    alert(data.message);
                    btn.disabled = false;
                    btn.innerText = "ПЕРЕЙТИ К ОПЛАТЕ";
                }
            })
            .catch(() => {
                alert("Ошибка связи с сайтом");
                btn.disabled = false;
            });
        }

        // Функция 2: Автоматическая выдача (если вернулись с оплаты)
        function autoGiveItem() {
            fetch('/buy-item', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nickname: nickname,
                    item: itemId,
                    amount: amount,
                    price: price
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('success-section').style.display = 'block';
                } else {
                    alert("Ошибка при выдаче! Напишите в тех.поддержку.");
                }
            });
        }

        window.onload = function() {
            // Если в ссылке есть ?paid=true, значит оплата прошла, выдаем товар
            if (urlParams.get('paid') === 'true') {
                document.getElementById('success-section').style.display = 'block';
                autoGiveItem();
            } else {
                // Иначе показываем кнопку оплаты
                document.getElementById('checkout-section').style.display = 'block';
            }
        };
    </script>
</body>
</html>

</html>
