<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Core — Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-overlay: rgba(10, 10, 20, 0.9);
            --admin-gold: #ffcc00;
            --admin-dark-gold: #b38728;
            --error-red: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            background: #050505;
        }

        .admin-hero {
            height: 100vh;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                        url('../static/images/bg.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .admin-hero h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--admin-gold);
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: rgba(255, 204, 0, 0.6);
            text-transform: uppercase;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 204, 0, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: var(--admin-gold);
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--admin-gold);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        .btn-enter {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--admin-dark-gold), var(--admin-gold));
            color: black;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 204, 0, 0.4);
            filter: brightness(1.1);
        }

        #error-message {
            color: var(--error-red);
            font-size: 0.8rem;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 600;
        }

        /* Текстовая кнопка возврата */
        .back-home {
            margin-top: 25px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: lowercase;
            transition: 0.3s;
            position: relative;
        }

        .back-home:hover {
            color: white;
        }

        .back-home::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 50%;
            background-color: white;
            transition: 0.3s;
            transform: translateX(-50%);
        }

        .back-home:hover::after {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="admin-hero">
    <h1>ADMIN ACCESS</h1>
    <p class="subtitle">restricted area</p>

    <div class="form-container">
        <div class="form-group">
            <input type="text" id="admin-id" placeholder="ID АДМИНИСТРАТОРА">
            <input type="password" id="admin-key" placeholder="КЛЮЧ ДОСТУПА">
        </div>

        <button class="btn-enter" onclick="checkAdmin()">
            Авторизовать
        </button>

        <div id="error-message"></div>
    </div>

    <button onclick="window.location.href='index.html'" class="back-home">
        на главную
    </button>
</div>

<script>
    function checkAdmin() {
        const id = document.getElementById('admin-id').value.trim();
        const key = document.getElementById('admin-key').value.trim();
        const errorDiv = document.getElementById('error-message');

        if (!id || !key) {
            errorDiv.textContent = 'ОШИБКА: ДАННЫЕ НЕ ВВЕДЕНЫ';
            return;
        }

        // Логика проверки (замени на свою или fetch запрос)
        if (id === "Flvbyyfcfqnt" && key === "dG-Z)eHY:~0_") {
            window.location.href = '/admin-panel';
        } else {
            errorDiv.textContent = 'ДОСТУП ЗАПРЕЩЕН: НЕВЕРНЫЙ КЛЮЧ';
        }
    }
</script>

</body>
</html>
