<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Galaxy Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070211;
            --panel-bg: rgba(20, 10, 35, 0.8);
            --neon-purple: #bc6ff1;
            --neon-blue: #00d2ff;
            --neon-gold: #ffcc00;
            --neon-red: #ff4d4d;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, var(--bg-dark) 100%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-container {
            width: 90%;
            max-width: 900px;
            background: var(--panel-bg);
            border: 2px solid rgba(188, 111, 241, 0.2);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(188, 111, 241, 0.1);
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .avatar-section {
            flex: 1;
            min-width: 200px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .skin-preview-wrapper {
            width: 150px;          
            height: 280px;         
            margin-bottom: 20px;
            border: 3px solid var(--neon-purple);
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 30px var(--neon-purple);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #skin-img {
            width: 100%;
            height: 100%;
            object-fit: contain;   
            image-rendering: pixelated; 
        }

        .player-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 10px;
            word-break: break-all;
        }

        .info-section {
            flex: 2;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--neon-purple);
            padding: 15px 25px;
            border-radius: 0 15px 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            overflow: hidden; /* Чтобы текст не вылезал */
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateX(10px);
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            min-width: fit-content;
            margin-right: 10px;
        }

        .value {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem; /* Немного уменьшил, чтобы влезало больше цифр */
            text-align: right;
            word-break: break-all;
            white-space: normal; /* Разрешаем перенос, если число безумно длинное */
        }

        .val-money { color: #55ff55; }
        .val-planets { color: var(--neon-gold); }
        .val-kills { color: var(--neon-red); }

        .back-btn {
            margin-top: 10px;
            text-decoration: none;
            color: #fff;
            font-size: 0.7rem;
            opacity: 0.5;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; color: var(--neon-blue); }

    </style>
</head>
<body>

<div class="profile-container">
    <div class="avatar-section">
        <div class="skin-preview-wrapper">
            <img src="https://mc-heads.net/body/steve/300" alt="Skin" id="skin-img">
        </div>
        <div class="player-name" id="nick-val">ЗАГРУЗКА...</div>
        <a href="/mainstorige" class="back-btn">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a>
    </div>

    <div class="info-section">
        <div class="info-card">
            <span class="label">Имя игрока</span>
            <span class="value" id="card-nick-val">...</span>
        </div>

        <div class="info-card" style="border-left-color: #55ff55;">
            <span class="label">Валюта (COINS)</span>
            <span class="value val-money" id="money-val">0 $</span>
        </div>

        <div class="info-card" style="border-left-color: var(--neon-gold);">
            <span class="label">Планетки</span>
            <span class="value val-planets" id="planets-val">0 ☄️</span>
        </div>

        <div class="info-card" style="border-left-color: var(--neon-red);">
            <span class="label">Убийств (KILLS)</span>
            <span class="value val-kills" id="kills-val">0</span>
        </div>
    </div>
</div>

<script>
    async function updateProfile() {
        try {
            // Добавляем timestamp, чтобы браузер не кешировал запрос
            const response = await fetch('/get_profile_data?t=' + new Date().getTime());
            const data = await response.json();

            if (data.status === "success") {
                const nickname = data.nickname || "Unknown";
                
                // Обновляем текст
                document.getElementById('nick-val').innerText = nickname.toUpperCase();
                document.getElementById('card-nick-val').innerText = nickname;
                
                // Форматируем числа (добавляем пробелы для читаемости)
                document.getElementById('money-val').innerText = Number(data.balance).toLocaleString() + " $";
                document.getElementById('planets-val').innerText = Number(data.planets).toLocaleString() + " ☄️";
                document.getElementById('kills-val').innerText = data.kills;

                // Обновляем скин (используем nickname из базы данных)
                const skinImg = document.getElementById('skin-img');
                const newSkinUrl = `https://mc-heads.net/body/${nickname}/300`;
                
                // Чтобы картинка обновилась, если скин поменяли, но ник тот же
                if (skinImg.src !== newSkinUrl) {
                    skinImg.src = newSkinUrl;
                }
            }
        } catch (e) {
            console.error("Ошибка загрузки данных:", e);
        }
    }

    // Запускаем сразу при загрузке
    window.onload = updateProfile;
    // Обновляем каждые 30 секунд
    setInterval(updateProfile, 30000);
</script>

</body>
</html>
